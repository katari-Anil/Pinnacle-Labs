<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Roster Directory</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="index.html">Pinnacle Labs Attendance</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="roster.html" class="active">Manage Roster</a></li>
            <li><a href="logs.html">Historical Logs</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="glass-card">
            <h2 style="margin-bottom: 1.25rem;">Register New Team Member</h2>
            <form id="add-member-form" class="form-inline">
                <div class="form-group">
                    <input type="text" id="member-id" class="form-control" placeholder="Unique ID (e.g., EMP104)" required>
                </div>
                <div class="form-group">
                    <input type="text" id="member-name" class="form-control" placeholder="Full Employee Name" required>
                </div>
                <div class="form-group">
                    <select id="member-dept" class="form-control" required>
                        <option value="Engineering">Engineering</option>
                        <option value="Design">Design</option>
                        <option value="Operations">Operations</option>
                        <option value="Marketing">Marketing</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Save Profile</button>
            </form>
        </div>

        <div class="glass-card">
            <h2 style="margin-bottom: 1.5rem;">Roster Directory Listing</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>ID Code</th>
                            <th>Member Identity Name</th>
                            <th>Assigned Department</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="roster-table-body">
                        <!-- Profiles are dynamically injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/roster.js"></script>
</body>
</html>
