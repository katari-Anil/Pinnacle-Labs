<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Ledger Archive</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="index.html">Pinnacle Labs Attendance</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="roster.html">Manage Roster</a></li>
            <li><a href="logs.html" class="active">Historical Logs</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="glass-card">
            <h2 style="margin-bottom: 1.25rem;">Audit Query Filter Engine</h2>
            <div class="form-inline">
                <div class="form-group" style="max-width: 250px;">
                    <input type="date" id="filter-date" class="form-control">
                </div>
                <div class="form-group">
                    <input type="text" id="search-name" class="form-control" placeholder="Search by name or token ID...">
                </div>
                <button id="filter-trigger" class="btn btn-primary">Run Audit Search</button>
            </div>
        </div>

        <div class="glass-card">
            <h2 style="margin-bottom: 1.5rem;">Historical Event Matrix Logs</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Log Date</th>
                            <th>ID Code</th>
                            <th>Employee Name</th>
                            <th>Department</th>
                            <th>Resolved Status</th>
                        </tr>
                    </thead>
                    <tbody id="logs-table-body">
                        <!-- Audit Rows Dynamic Destination Target -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/logs.js"></script>
</body>
</html>
