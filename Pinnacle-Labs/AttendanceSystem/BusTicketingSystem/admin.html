<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Console Operations - CloudBus</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .metric-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .metric-box { background: rgba(255,255,255,0.7); padding: 1.5rem; border-radius: 12px; text-align: center; box-shadow: var(--shadow); }
        .metric-box h2 { margin: 0; color: var(--navy-blue); font-size: 2rem; }
    </style>
</head>
<body>
    <header>
        <h1>⚡ Admin Fleet Panel</h1>
        <nav><a href="index.html">Customer View</a></nav>
    </header>

    <main class="glass-card">
        <div class="metric-row">
            <div class="metric-box"><h2 id="mRev">₹0</h2><p>Gross Realized Revenue</p></div>
            <div class="metric-box"><h2 id="mCount">0</h2><p>Tickets Processed</p></div>
            <div class="metric-box"><h2 id="mFleet">0</h2><p>Active Vehicles</p></div>
        </div>

        <h3>Commission Premium Fleet Route</h3>
        <form id="fleetCommissionForm">
            <div class="grid-2">
                <div class="form-group"><label>Fleet Identification String</label><input type="text" id="fId" placeholder="IND-KA12" required></div>
                <div class="form-group"><label>Corporate Operator Title</label><input type="text" id="fName" placeholder="Zingbus Electric Multi-Axle" required></div>
            </div>
            <div class="grid-2">
                <div class="form-group"><label>Source Route Node</label><input type="text" id="fSrc" required></div>
                <div class="form-group"><label>Destination Route Node</label><input type="text" id="fDst" required></div>
            </div>
            <div class="grid-2">
                <div class="form-group"><label>Departure Window</label><input type="text" id="fDep" placeholder="08:00 PM" required></div>
                <div class="form-group"><label>Arrival Window</label><input type="text" id="fArr" placeholder="06:00 AM" required></div>
            </div>
            <div class="form-group"><label>Base Fare Price Rate (INR)</label><input type="number" id="fPrice" required></div>
            <button type="submit" class="btn">Deploy Fleet Route to System Tables</button>
        </form>
    </main>

    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
