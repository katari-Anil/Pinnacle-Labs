<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Payment - CloudBus</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .loading-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.9); z-index: 99; align-items: center; justify-content: center;
            flex-direction: column; font-size: 1.2rem; font-weight: bold;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(0,0,80,0.1);
            border-top-color: var(--navy-blue); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
        <p id="loaderText">Contacting Banking Infrastructure Gateway...</p>
    </div>

    <main class="glass-card" style="max-width: 550px; margin-top: 3rem;">
        <h2 style="text-align: center;">Payment Gateway</h2>
        <h3 id="payableDisplay" style="text-align: center; color: var(--indian-green); margin-bottom: 2rem;">Total Amount Due: ₹0</h3>
        
        <form id="paymentForm">
            <div class="form-group">
                <label>Payment Mode</label>
                <select id="gatewaySelector">
                    <option value="upi">BHIM UPI (GPay, PhonePe, Paytm)</option>
                    <option value="card">Credit / Debit Card (RuPay, Visa, Mastercard)</option>
                </select>
            </div>
            <div id="dynamicInputContainer">
                <div class="form-group">
                    <label>Virtual Payment Address (VPA / UPI ID)</label>
                    <input type="text" placeholder="passenger@upi" required>
                </div>
            </div>
            <button type="submit" class="btn" style="background:var(--indian-green); margin-top: 1rem;">Authorize Settlement Securely</button>
        </form>
    </main>

    <script src="js/app.js"></script>
    <script src="js/payment.js"></script>
</body>
</html>
