<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmed - CloudBus India</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .badge-confirmed { background: var(--indian-green); color: white; padding: 6px 14px; border-radius: 30px; font-size: 0.85rem; font-weight: bold; display: inline-block; margin-bottom: 1rem; }
        .receipt-table { margin: 1.5rem 0; width: 100%; text-align: left; border-collapse: collapse; }
        .receipt-table td { padding: 10px 0; border-bottom: 1px dashed rgba(0,0,0,0.1); font-size: 1rem; }
        .receipt-table td:last-child { text-align: right; font-weight: bold; }
    </style>
</head>
<body>
    <main class="glass-card" style="max-width: 600px; text-align: center; margin-top: 2rem;">
        <div class="badge-confirmed">✓ TRANSACT SECURE CONFIRMED</div>
        <h2>E-Ticket / Booking Receipt</h2>
        <p style="color: #555;">Show this digital copy to your bus operator during boarding.</p>
        
        <table class="receipt-table" id="receiptRenderBlock"></table>

        <button class="btn" onclick="window.print()" style="margin-bottom: 12px;">Print / Save PDF Ticket</button>
        <a href="index.html" class="btn" style="background:var(--navy-blue);">Book Another Journey</a>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentPNR = new URLSearchParams(window.location.search).get('pnr');
            const targetTicket = getBookings().find(b => b.id === currentPNR);
            const busReference = getBuses().find(b => b.id === targetTicket?.busId);

            if(!targetTicket) { window.location.href = 'index.html'; return; }

            document.getElementById('receiptRenderBlock').innerHTML = `
                <tr><td>PNR Reference Code</td><td>${targetTicket.id}</td></tr>
                <tr><td>Passenger Name</td><td>${targetTicket.passenger.name} (${targetTicket.passenger.age})</td></tr>
                <tr><td>Fleet Operator</td><td>${busReference.name}</td></tr>
                <tr><td>Route Specifications</td><td>${busReference.source} to ${busReference.destination}</td></tr>
                <tr><td>Departure Window</td><td>${busReference.departure} | ${targetTicket.date}</td></tr>
                <tr><td>Assigned Seats</td><td>${targetTicket.seats.join(', ')}</td></tr>
                <tr><td>Fare Settled</td><td>₹${targetTicket.totalPrice}</td></tr>
            `;
        });
    </script>
</body>
</html>
